<style>
  :root{
    --navy:#1B2A4A; --navy-l:#2E4A7A; --gold:#C9A84C; --gold-d:#A07830;
    --cream:#FAF6EE; --gray:#E8E0D0; --ink:#333; --muted:#8a8577; --white:#fff; --orange:#D4711E;
    --serif:"Noto Serif TC",serif; --sans:"Noto Sans TC",sans-serif; --disp:"Playfair Display",serif;
    --shadow:0 8px 28px rgba(27,42,74,.14);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);color:var(--ink);background:var(--cream);line-height:1.7;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  ::selection{background:var(--gold);color:var(--navy)}
  a{color:inherit;text-decoration:none}

  header.top{position:sticky;top:0;z-index:50;background:var(--navy);color:#fff;display:flex;align-items:center;
    gap:10px;padding:10px 14px;border-bottom:2px solid var(--gold);padding-top:calc(10px + env(safe-area-inset-top))}
  header.top a.home{color:var(--gold);font-size:13px;flex:none}
  header.top .wm{font-family:var(--serif);font-weight:700;font-size:14px;flex:1;text-align:center}
  header.top .wm b{color:var(--orange)}
  .modeswitch{display:flex;background:rgba(255,255,255,.08);border:1px solid rgba(201,168,76,.4);border-radius:999px;overflow:hidden;flex:none}
  .modeswitch button{border:none;background:transparent;color:var(--gray);font-size:12px;padding:6px 11px;cursor:pointer;font-family:var(--sans)}
  .modeswitch button.on{background:var(--gold);color:var(--navy);font-weight:700}

  /* deck picker */
  .picker{background:var(--cream);position:sticky;top:calc(46px + env(safe-area-inset-top));z-index:40;
    padding:10px 12px;box-shadow:0 6px 12px -9px rgba(27,42,74,.25)}
  .picker .row{display:flex;gap:7px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .picker .row::-webkit-scrollbar{height:0}
  .pchip{white-space:nowrap;border:1px solid var(--gray);background:#fff;color:var(--navy);border-radius:999px;
    padding:7px 14px;font-size:12.5px;cursor:pointer;flex:none;transition:.15s}
  .pchip.active{background:var(--navy);color:#fff;border-color:var(--navy)}

  /* ── SCROLL MODE ── */
  #scrollView{max-width:560px;margin:0 auto;padding:16px 14px 60px}
  #scrollView.hide{display:none}
  .sec{background:#fff;border:1px solid var(--gray);border-radius:16px;padding:20px 18px;margin-bottom:14px;box-shadow:0 3px 12px rgba(27,42,74,.07)}
  .sec.cover{background:linear-gradient(140deg,var(--navy),var(--navy-l));color:#fff;border:none;padding:30px 22px}

  /* ── CARD MODE ── */
  #cardView{display:none;position:relative}
  #cardView.show{display:block}
  .track{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
  .track::-webkit-scrollbar{display:none}
  .slide{flex:none;width:100vw;max-width:560px;scroll-snap-align:center;padding:16px 14px;min-height:calc(100vh - 200px)}
  .slide .sheet{background:#fff;border:1px solid var(--gray);border-radius:18px;padding:22px 18px;min-height:100%;box-shadow:var(--shadow);display:flex;flex-direction:column}
  .slide .sheet.cover{background:linear-gradient(140deg,var(--navy),var(--navy-l));color:#fff;border:none;justify-content:center}
  .cardnav{display:flex;align-items:center;justify-content:center;gap:14px;padding:10px 0 20px}
  .cardnav button{border:1px solid var(--navy);background:#fff;color:var(--navy);width:42px;height:42px;border-radius:50%;font-size:18px;cursor:pointer}
  .cardnav button:disabled{opacity:.3}
  .dots{display:flex;gap:6px}
  .dots i{width:7px;height:7px;border-radius:50%;background:var(--gray);transition:.2s}
  .dots i.on{background:var(--gold);width:20px;border-radius:4px}

  /* content blocks (shared by both modes) */
  .eyebrow{font-family:var(--disp);font-style:italic;color:var(--gold);letter-spacing:1.5px;font-size:12px}
  .cover .ttl{font-family:var(--serif);font-weight:900;font-size:26px;line-height:1.3;margin:8px 0 6px}
  .cover .sub{color:var(--cream);font-size:14px;line-height:1.7}
  .cover .src{font-family:var(--disp);color:var(--gold);font-size:12px;letter-spacing:1px;margin-top:14px}
  .cover .badge{display:inline-block;margin-top:16px;background:rgba(201,168,76,.16);border:1px solid rgba(201,168,76,.4);
    color:var(--gold);border-radius:999px;padding:5px 14px;font-size:12px}

  .blocktitle{font-family:var(--serif);font-weight:700;color:var(--navy);font-size:19px;display:flex;align-items:center;gap:9px;margin-bottom:4px}
  .blocktitle .n{font-family:var(--disp);font-weight:800;color:var(--gold);font-size:22px}
  .blocksub{color:var(--muted);font-size:12.5px;margin-bottom:14px}

  .subcard{border-radius:12px;overflow:hidden;border:1px solid var(--gray);margin-bottom:12px}
  .subcard .h{padding:9px 13px;font-size:14px;font-weight:700;color:#fff}
  .subcard.fact .h{background:var(--navy)}
  .subcard.view .h{background:var(--orange)}
  .subcard ul{list-style:none;padding:11px 13px;background:var(--cream)}
  .subcard li{font-size:14px;line-height:1.6;padding-left:16px;position:relative;margin-bottom:8px;color:var(--ink)}
  .subcard li:last-child{margin-bottom:0}
  .subcard li::before{content:"▸";position:absolute;left:0;color:var(--gold-d)}

  .chain .step{display:flex;gap:11px;align-items:flex-start;margin-bottom:4px}
  .chain .num{flex:none;width:30px;height:30px;border-radius:50%;background:var(--navy);color:#fff;
    font-family:var(--disp);font-weight:800;font-size:14px;display:grid;place-items:center;margin-top:2px}
  .chain .step:first-child .num{background:var(--orange)}
  .chain .txt{flex:1;background:var(--cream);border:1px solid var(--gray);border-radius:10px;padding:10px 12px;font-size:14px;line-height:1.55}
  .chain .arw{color:var(--gold);font-size:13px;margin:1px 0 1px 13px;line-height:.8}

  .mkt{border:1px solid var(--gray);border-radius:12px;overflow:hidden;margin-bottom:11px}
  .mkt .mh{background:var(--navy);color:#fff;padding:9px 13px;display:flex;align-items:center;gap:9px}
  .mkt .mi{width:28px;height:28px;border-radius:50%;background:rgba(201,168,76,.9);color:var(--navy);display:grid;place-items:center;font-weight:800;font-size:14px}
  .mkt .mn{font-family:var(--serif);font-weight:700;font-size:16px}
  .mkt .mb{padding:11px 13px;background:var(--cream)}
  .mkt .lbl{font-size:11px;font-weight:700;color:var(--gold-d)}
  .mkt .val{font-size:13.5px;line-height:1.55;margin:2px 0 9px;color:var(--ink)}
  .mkt .val:last-child{margin-bottom:0}

  .layer3 .li{display:flex;gap:11px;margin-bottom:11px;align-items:flex-start}
  .layer3 .k{flex:none;font-family:var(--disp);font-weight:800;font-size:20px;color:var(--gold)}
  .layer3 .lt b{color:var(--navy);font-size:15px}
  .layer3 .lt p{font-size:13px;color:var(--ink);margin-top:1px}

  .ck{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;border:1px solid var(--gray);border-radius:10px;margin-bottom:8px;background:var(--cream)}
  .ck .cn{flex:none;width:24px;height:24px;border-radius:6px;background:var(--navy);color:var(--gold);display:grid;place-items:center;font-family:var(--disp);font-weight:800;font-size:13px}
  .ck .ct{font-size:13.5px;line-height:1.55}
  .ck .ct b{color:var(--navy)}

  .closing{background:linear-gradient(140deg,var(--navy),var(--navy-l));color:#fff;border:none!important}
  .closing .blocktitle{color:#fff}
  .closing .blocktitle .n{color:var(--gold)}
  .closing p{color:var(--cream);font-size:15px;line-height:1.8;margin-top:6px}
  .closing .line{width:44px;height:2px;background:var(--gold);margin:14px 0}

  .foot{text-align:center;color:var(--muted);font-size:12px;padding:10px 0 4px}
  .foot b{color:var(--orange);font-family:var(--serif)}

  @media(min-width:600px){ .slide{min-height:auto} }
</style>
</head>

    '<div class="subcard fact"><div class="h">客觀事實（已發生）</div><ul>'+
      d.facts.map(function(f){return '<li>'+f+'</li>'}).join('')+'</ul></div>'+
    '<div class="subcard view"><div class="h">專家推測／解讀</div><ul>'+
      d.views.map(function(v){return '<li>'+v+'</li>'}).join('')+'</ul></div>';
}
function blkChain(d){
  var h='<div class="blocktitle"><span class="n">②</span>因果鏈</div><div class="blocksub">從根源一路推到結果</div><div class="chain">';
  d.chain.forEach(function(c,i){
    h+='<div class="step"><div class="num">'+(i+1)+'</div><div class="txt">'+c+'</div></div>';
    if(i<d.chain.length-1)h+='<div class="arw">▾</div>';
  });
  return h+'</div>';
}
function blkMarkets(d){
  return '<div class="blocktitle"><span class="n">③</span>三大市場連動</div><div class="blocksub">同一件事，三個市場分別怎麼看</div>'+
    d.markets.map(function(m){
      return '<div class="mkt"><div class="mh"><div class="mi">'+icon(m.n)+'</div><div class="mn">'+m.n+'</div></div>'+
        '<div class="mb"><div class="lbl">判斷邏輯</div><div class="val">'+m.logic+'</div>'+
        '<div class="lbl">案例啟示</div><div class="val">'+m.insight+'</div></div></div>';
    }).join('');
}
function blkCheck(){
  return '<div class="blocktitle"><span class="n">✓</span>判斷 Checklist</div><div class="blocksub">下判斷前逐項確認</div>'+
    CK.map(function(c,i){return '<div class="ck"><div class="cn">'+(i+1)+'</div><div class="ct"><b>'+c.t+'</b>｜'+c.d+'</div></div>'}).join('');
}
function blkClosing(d){
  return '<div class="blocktitle">結語</div><div class="line"></div><p>'+d.closing+'</p>'+
    '<div class="foot" style="color:var(--gold);margin-top:16px">熊誠毅<b style="color:#fff">｜誠毅傳承</b></div>';
}

function buildBlocks(d){
  var arr=[];
  arr.push({cover:true,html:blkCover(d)});
  if(d.method)arr.push({html:blkMethod()});
  arr.push({html:blkFactView(d)});
  arr.push({html:blkChain(d)});
  arr.push({html:blkMarkets(d)});
  arr.push({html:blkCheck()});
  arr.push({closing:true,html:blkClosing(d)});
  return arr;
}

var mode="scroll", curDeck=0, cardIdx=0;

function renderPicker(){
  var host=document.getElementById("picker");host.innerHTML="";
  DECKS.forEach(function(d,i){
    var short=d.method?"方法教學":d.title.split("　")[0];
    var b=document.createElement("button");
    b.className="pchip"+(i===curDeck?" active":"");
    b.textContent=short;
    b.onclick=function(){curDeck=i;cardIdx=0;renderPicker();renderAll();window.scrollTo(0,0)};
    host.appendChild(b);
  });
}

function renderScroll(){
  var host=document.getElementById("scrollView");host.innerHTML="";
  buildBlocks(DECKS[curDeck]).forEach(function(b){
    var s=document.createElement("section");
    s.className="sec"+(b.cover?" cover":"")+(b.closing?" closing":"");
    s.innerHTML=b.html;host.appendChild(s);
  });
}
function renderCards(){
  var track=document.getElementById("track");track.innerHTML="";
  var blocks=buildBlocks(DECKS[curDeck]);
  blocks.forEach(function(b){
    var sl=document.createElement("div");sl.className="slide";
    sl.innerHTML='<div class="sheet'+(b.cover?" cover":"")+(b.closing?" closing":"")+'">'+b.html+'</div>';
    track.appendChild(sl);
  });
  var dots=document.getElementById("dots");dots.innerHTML="";
  blocks.forEach(function(_,i){var d=document.createElement("i");if(i===0)d.className="on";dots.appendChild(d)});
  cardIdx=0;updateCardNav();
  // 監聽滑動更新 dots
  track.onscroll=function(){
    var w=track.querySelector(".slide").offsetWidth;
    var idx=Math.round(track.scrollLeft/w);
    if(idx!==cardIdx){cardIdx=idx;updateCardNav()}
  };
}
function updateCardNav(){
  var dots=document.getElementById("dots").children;
  for(var i=0;i<dots.length;i++)dots[i].className=(i===cardIdx?"on":"");
  document.getElementById("prev").disabled=(cardIdx<=0);
  document.getElementById("next").disabled=(cardIdx>=dots.length-1);
}
function cardGo(dir){
  var track=document.getElementById("track");
  var w=track.querySelector(".slide").offsetWidth;
  track.scrollTo({left:(cardIdx+dir)*w,behavior:"smooth"});
}
function renderAll(){ mode==="scroll"?renderScroll():renderCards(); }

function setMode(m){
  mode=m;
  document.getElementById("mScroll").className=(m==="scroll"?"on":"");
  document.getElementById("mCard").className=(m==="card"?"on":"");
  document.getElementById("scrollView").className=(m==="scroll"?"":"hide");
  document.getElementById("cardView").className=(m==="card"?"show":"");
  renderAll();window.scrollTo(0,0);
}

// 讀取 ?d=deckId 開對應簡報
(function initParam(){
  var q=(location.search.match(/[?&]d=([^&]+)/)||[])[1];
  if(q){var i=DECKS.findIndex(function(d){return d.id===decodeURIComponent(q)});if(i>=0)curDeck=i;}
})();

renderPicker();renderAll();
if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("sw.js").catch(function(){})})}
</script>
</body>
</html>
