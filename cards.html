<style>
  :root{
    --navy:#1B2A4A; --navy-l:#2E4A7A; --gold:#C9A84C; --gold-d:#A07830;
    --cream:#FAF6EE; --gray:#E8E0D0; --ink:#333; --muted:#8a8577; --white:#fff; --orange:#D4711E;
    --serif:"Noto Serif TC",serif; --sans:"Noto Sans TC",sans-serif; --disp:"Playfair Display",serif;
    --shadow:0 8px 28px rgba(27,42,74,.14);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:var(--sans);color:var(--ink);background:var(--cream);line-height:1.6;-webkit-font-smoothing:antialiased}
  ::selection{background:var(--gold);color:var(--navy)}

  header.top{position:sticky;top:0;z-index:50;background:var(--navy);color:#fff;display:flex;align-items:center;
    gap:12px;padding:10px 18px;border-bottom:2px solid var(--gold)}
  header.top img{width:32px;height:32px;border-radius:6px;flex:none}
  header.top .wm{font-family:var(--serif);font-weight:700;font-size:15px;letter-spacing:.5px}
  header.top .wm b{color:var(--orange)}
  header.top .wm span{color:var(--gold);margin:0 3px;font-weight:500;font-size:12px}

  .hero{background:linear-gradient(135deg,var(--navy),var(--navy-l));color:#fff;padding:38px 20px 30px;text-align:center;position:relative;overflow:hidden}
  .hero::after{content:"";position:absolute;left:50%;bottom:-90px;transform:translateX(-50%);width:260px;height:260px;border:1px solid rgba(201,168,76,.2);border-radius:50%}
  .hero .eyebrow{font-family:var(--disp);font-style:italic;color:var(--gold);letter-spacing:2px;font-size:13px;margin-bottom:8px}
  .hero h1{font-family:var(--serif);font-weight:900;font-size:clamp(26px,5vw,38px);letter-spacing:1px}
  .hero p{color:var(--gray);margin-top:10px;font-size:14px;max-width:520px;margin-left:auto;margin-right:auto}
  .hero .howto{margin-top:16px;font-size:12.5px;color:var(--gold);display:inline-flex;align-items:center;gap:7px;
    background:rgba(255,255,255,.06);border:1px solid rgba(201,168,76,.3);padding:6px 14px;border-radius:999px}

  .controls{position:sticky;top:52px;z-index:40;background:var(--cream);padding:14px 16px 10px;box-shadow:0 6px 12px -8px rgba(27,42,74,.2)}
  .controls .inner{max-width:1000px;margin:0 auto}
  .search{width:100%;border:1px solid var(--gray);border-radius:10px;padding:11px 14px;font-family:var(--sans);
    font-size:14px;outline:none;background:#fff;color:var(--ink);margin-bottom:10px}
  .search:focus{border-color:var(--gold)}
  .tabs{display:flex;gap:7px;overflow-x:auto;padding-bottom:3px;-webkit-overflow-scrolling:touch}
  .tabs::-webkit-scrollbar{height:0}
  .tab{white-space:nowrap;border:1px solid var(--gray);background:#fff;color:var(--navy);border-radius:999px;
    padding:7px 15px;font-size:13px;cursor:pointer;font-family:var(--sans);transition:.15s;flex:none}
  .tab:hover{border-color:var(--gold)}
  .tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  .tab .c{font-family:var(--disp);color:var(--gold);font-size:11px;margin-left:5px}
  .tab.active .c{color:var(--gold)}

  main{max-width:1000px;margin:0 auto;padding:20px 16px 60px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}

  /* flip card */
  .card{perspective:1400px;height:260px;cursor:pointer}
  .flip{position:relative;width:100%;height:100%;transition:transform .55s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d}
  .card.flipped .flip{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    border-radius:16px;padding:20px;display:flex;flex-direction:column;overflow:hidden}
  /* front */
  .front{background:#fff;border:1px solid var(--gray);box-shadow:var(--shadow)}
  .front .cat{font-size:11px;font-weight:700;color:var(--gold-d);letter-spacing:.5px}
  .front .term{font-family:var(--serif);font-weight:900;color:var(--navy);font-size:26px;line-height:1.2;margin-top:6px}
  .front .en{font-family:var(--disp);font-style:italic;color:var(--muted);font-size:13px;margin-top:2px}
  .front .snip{margin-top:auto;background:var(--cream);border:1px dashed var(--gray);border-radius:10px;
    padding:11px 12px;font-size:13px;color:var(--navy);line-height:1.55}
  .front .snip .lb{display:block;font-size:10px;color:var(--gold-d);font-weight:700;letter-spacing:1px;margin-bottom:4px}
  .front .snip mark{background:transparent;color:var(--orange);font-weight:700;padding:0}
  .front .flip-hint{position:absolute;right:14px;top:16px;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px}
  /* back */
  .back{background:var(--navy);color:#fff;transform:rotateY(180deg);border:1px solid var(--gold)}
  .back .bterm{font-family:var(--serif);font-weight:700;color:var(--gold);font-size:16px;margin-bottom:8px;flex:none}
  .back .oneline{font-size:15px;font-weight:700;line-height:1.5;color:#fff;margin-bottom:10px}
  .back .rowlab{font-size:10.5px;color:var(--gold);font-weight:700;letter-spacing:1px;margin-top:2px}
  .back .rowtxt{font-size:12.5px;color:#EDE7DA;line-height:1.55;margin-bottom:8px}
  .back .signal{margin-top:auto;background:rgba(201,168,76,.14);border-radius:9px;padding:9px 11px;font-size:12px;color:#fff;line-height:1.5}
  .back .signal b{color:var(--gold)}

  .count{text-align:center;color:var(--muted);font-size:12.5px;margin:16px 0 4px}
  .empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:14px}

  footer{background:var(--navy);color:var(--gray);text-align:center;padding:22px;font-size:12px;border-top:2px solid var(--gold);margin-top:20px}
  footer .bd{font-family:var(--serif);color:#fff;font-size:14px;margin-bottom:4px}
  footer .bd b{color:var(--orange)}
  footer .motto{color:var(--gold);font-size:11px;letter-spacing:1px;margin-top:6px}

  @media(max-width:520px){.grid{grid-template-columns:1fr}.card{height:250px}}
</style>
</head>

var CATS=["全部","利率與央行","物價與通膨","匯率","景氣指標","股市籌碼","債市"];
var curCat="全部", curSearch="";

function el(t,c,h){var e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e}

function renderTabs(){
  var host=document.getElementById("tabs");host.innerHTML="";
  CATS.forEach(function(cat){
    var n = cat==="全部"?CARDS.length:CARDS.filter(function(c){return c.cat===cat}).length;
    var b=el("button","tab"+(cat===curCat?" active":""),cat+'<span class="c">'+n+'</span>');
    b.onclick=function(){curCat=cat;renderTabs();renderGrid()};
    host.appendChild(b);
  });
}

function match(c){
  if(curCat!=="全部"&&c.cat!==curCat)return false;
  if(!curSearch)return true;
  var q=curSearch.toLowerCase();
  return (c.term+c.en+c.one+c.analogy+c.news+c.cat).toLowerCase().indexOf(q)>=0;
}

function renderGrid(){
  var host=document.getElementById("grid");host.innerHTML="";
  var list=CARDS.filter(match);
  document.getElementById("empty").style.display=list.length?"none":"block";
  document.getElementById("count").textContent=list.length?("共 "+list.length+" 張觀念卡"):"";
  list.forEach(function(c){
    var card=el("div","card");
    card.innerHTML=
      '<div class="flip">'+
        '<div class="face front">'+
          '<div class="flip-hint">翻面 ↻</div>'+
          '<div class="cat">'+c.cat+'</div>'+
          '<div class="term">'+c.term+'</div>'+
          '<div class="en">'+c.en+'</div>'+
          '<div class="snip"><span class="lb">新聞裡長這樣</span>'+c.snip+'</div>'+
        '</div>'+
        '<div class="face back">'+
          '<div class="bterm">'+c.term+'</div>'+
          '<div class="oneline">'+c.one+'</div>'+
          '<div class="rowlab">生活比喻</div><div class="rowtxt">'+c.analogy+'</div>'+
          '<div class="rowlab">新聞這樣看</div><div class="rowtxt">'+c.news+'</div>'+
          '<div class="signal">📈 對市場的意義：'+c.signal+'</div>'+
        '</div>'+
      '</div>';
    card.onclick=function(){card.classList.toggle("flipped")};
    host.appendChild(card);
  });
}

document.getElementById("search").oninput=function(e){curSearch=e.target.value.trim();renderGrid()};

renderTabs();renderGrid();
if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("sw.js").catch(function(){})})}
